<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Снежинка — VK Play</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3csvg... (ваш фавикон)" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (стили из предыдущего ответа — без изменений) */
        ::-webkit-scrollbar { width: 0; background: transparent; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0A0C0F;
            font-family: "Inter", sans-serif;
            color: #E1E3E6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .dashboard {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px 40px;
            width: 100%;
        }
        .page-title {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin: 20px 0 40px;
            color: white;
        }
        .auth-card {
            background: rgba(20,25,30,0.9);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 40px 30px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            margin-bottom: 40px;
        }
        .auth-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            background: #0077FF;
            color: white;
            box-shadow: 0 8px 20px -8px #0077FF;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #0077FF;
            color: #0077FF;
            box-shadow: none;
        }
        .btn-outline:hover {
            background: #0077FF;
            color: white;
        }
        .hidden { display: none; }
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #0077FF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ... остальные стили (карточки, футер) из предыдущего ответа — оставьте их без изменений ... */
    </style>
</head>
<body>
    <div class="dashboard">
        <h1 class="page-title">МАС «Снежинка»</h1>

        <!-- Блок загрузки (показывается, пока проверяется статус) -->
        <div id="loading" class="auth-card">
            <div class="loader"></div>
            <p>Проверка авторизации...</p>
        </div>

        <!-- Блок для неавторизованного пользователя -->
        <div id="notAuthorized" class="auth-card hidden">
            <div style="font-size: 3rem; color: #0077FF; margin-bottom: 20px;">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2 style="color: white; margin-bottom: 10px;">Добро пожаловать в Арктику</h2>
            <p style="color: #aaa;">Войдите с помощью VK Play, чтобы начать исследование.</p>
            <div class="auth-buttons">
                <button class="btn" id="loginBtn">Войти</button>
                <button class="btn btn-outline" id="registerBtn">Регистрация</button>
            </div>
        </div>

        <!-- Блок для авторизованного пользователя -->
        <div id="authorized" class="auth-card hidden">
            <div style="font-size: 3rem; color: #0077FF; margin-bottom: 20px;">
                <i class="fas fa-user-astronaut"></i>
            </div>
            <h2 style="color: white; margin-bottom: 10px;">Привет, <span id="profileName"></span>!</h2>
            <p style="color: #aaa;">Ваш ID: <span id="profileId"></span></p>
            <p style="color: #aaa; margin-top: 10px;">Ник: <span id="profileNick"></span></p>
            <div style="margin-top: 20px;">
                <button class="btn btn-outline" id="logoutBtn">Выйти</button>
            </div>
        </div>

        <!-- Карточки особенностей игры (оставьте как есть) -->
        <!-- ... -->
    </div>

    <!-- Футер (как в вашем файле) -->
    <footer class="footer">...</footer>

    <!-- Подключение VK Play API (с вашим GMRID) -->
    <script type="text/javascript" src="https://vkplay.ru/app/47268/static/mailru.core.js"></script>
    <script>
        let externalApi = null;

        // Показываем loader, скрываем остальное
        document.getElementById('loading').classList.remove('hidden');

        (function apiHandshake(iframeApi) {
            if (typeof iframeApi === 'undefined') {
                console.error('VK Play API не загружен');
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('notAuthorized').classList.remove('hidden');
                return;
            }

            const callbacks = {
                appid: 47268,

                // Колбэк статуса авторизации
                getLoginStatusCallback: function(status) {
                    console.log('Login status:', status);
                    // Проверяем разные варианты статуса (объект с session / число / поле auth)
                    const isAuth = status && (
                        status.session || 
                        status.auth === true || 
                        status === 2 || 
                        (typeof status === 'object' && status.uid)
                    );

                    if (isAuth) {
                        // Если авторизован — запрашиваем полные данные
                        externalApi.userInfo();
                    } else {
                        // Не авторизован — показываем блок входа
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('notAuthorized').classList.remove('hidden');
                    }
                },

                // Колбэк с данными пользователя
                userInfoCallback: function(info) {
                    console.log('User info:', info);
                    if (info && info.uid) {
                        // Показываем профиль
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('authorized').classList.remove('hidden');

                        document.getElementById('profileName').textContent = 
                            `${info.first_name || ''} ${info.last_name || ''}`.trim() || 'Игрок';
                        document.getElementById('profileId').textContent = info.uid;
                        document.getElementById('profileNick').textContent = info.nick || '—';
                    } else {
                        // Ошибка — показываем вход
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('notAuthorized').classList.remove('hidden');
                    }
                },

                // После регистрации — сразу запрашиваем данные
                registerUserCallback: function(info) {
                    console.log('Registration:', info);
                    externalApi.userInfo();
                }
            };

            function error(err) {
                console.error('API connection error:', err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('notAuthorized').classList.remove('hidden');
            }

            function connected(api) {
                externalApi = api;
                console.log('VK Play API connected');
                // Запрашиваем статус
                externalApi.getLoginStatus();
            }

            iframeApi(callbacks).then(connected, error);
        }(window.iframeApi));

        // Обработчики кнопок
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginBtn')?.addEventListener('click', function() {
                if (externalApi) externalApi.authUser();
            });
            document.getElementById('registerBtn')?.addEventListener('click', function() {
                if (externalApi) externalApi.registerUser();
            });
            document.getElementById('logoutBtn')?.addEventListener('click', function() {
                // Для выхода просто перезагружаем страницу (можно также сбросить состояние)
                location.reload();
            });
        });
    </script>
</body>
</html>
